<!DOCTYPE html>
<html>
<head>
  <title>Malabar Aqua Farm</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {font-family: Arial; margin:0; background:#f5f5f5;}
    header {background:#2e7d32; color:white; padding:15px; text-align:center;}
    nav {text-align:center; margin:10px;}
    nav a {margin:10px; text-decoration:none; color:#2e7d32; font-weight:bold;}
    .container {padding:20px;}
    .grid {display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap:20px;}
    .card {background:white; padding:15px; border-radius:10px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    img {width:100%; border-radius:10px;}
    .btn {display:inline-block; margin-top:10px; padding:10px 15px; background:#25D366; color:white; text-decoration:none; border-radius:5px;}
  </style>
</head>
<body>

<header>
  <h1>🌿 Malabar Aqua Farm 🦐</h1>
  <p>Fresh Aquatic Plants & Shrimp in Kerala</p>
</header>

<nav>
  <a href="#plants">Plants</a>
  <a href="#shrimp">Shrimp</a>
  <a href="#contact">Contact</a>
</nav>

<div class="container">

  <h2 id="plants">🌱 Plants</h2>
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Java Moss</h3>
      <p>₹150</p>
      <a class="btn" href="https://wa.me/91XXXXXXXXXX?text=I%20want%20Java%20Moss">Order</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Anubias Nana</h3>
      <p>₹250</p>
      <a class="btn" href="https://wa.me/91XXXXXXXXXX?text=I%20want%20Anubias%20Nana">Order</a>
    </div>

  </div>

  <h2 id="shrimp">🦐 Shrimp</h2>
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Red Cherry Shrimp</h3>
      <p>₹50 each</p>
      <a class="btn" href="https://wa.me/91XXXXXXXXXX?text=I%20want%20Red%20Cherry%20Shrimp">Order</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Blue Dream Shrimp</h3>
      <p>₹80 each</p>
      <a class="btn" href="https://wa.me/91XXXXXXXXXX?text=I%20want%20Blue%20Dream%20Shrimp">Order</a>
    </div>

  </div>

  <h2 id="contact">📞 Contact</h2>
  <p>WhatsApp: +91XXXXXXXXXX</p>
  <p>Location: Kerala</p>

</div>

</body>
</html>
