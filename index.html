<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malabar Aqua Farm</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#ffffff;
  color:#111;
  overflow-x:hidden;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  font-weight:500;
}

/* HERO */
.hero {
  text-align:center;
  padding:100px 20px;
}

.hero h1 {
  font-size:42px;
  font-weight:500;
}

.hero p {
  color:#666;
  margin-top:10px;
}

.btn {
  margin-top:25px;
  padding:12px 25px;
  border-radius:25px;
  background:#111;
  color:#fff;
  text-decoration:none;
  display:inline-block;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
}

/* PRODUCTS */
.section {
  padding:60px 20px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:40px;
  max-width:900px;
  margin:auto;
}

.card {
  padding:20px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  border-radius:12px;
}

.price {
  color:#666;
}

/* FLOATING WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
  font-size:20px;
}

/* FISH */
.fish {
  position:fixed;
  font-size:24px;
  pointer-events:none;
  transition: transform 0.2s linear;
}
</style>
</head>

<body>

<nav>
  <div>Malabar Aqua Farm</div>
</nav>

<section class="hero">
  <h1>Premium Aquatic Plants & Shrimp</h1>
  <p>Kerala Based • Healthy • Handpicked</p>
  <a class="btn" href="https://wa.me/919876543210">Shop on WhatsApp</a>
</section>

<section class="section">
  <h2>Plants</h2>
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Java Moss</h3>
      <p class="price">₹150</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Anubias Nana</h3>
      <p class="price">₹250</p>
    </div>

  </div>
</section>

<section class="section">
  <h2>Shrimp</h2>
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Red Cherry Shrimp</h3>
      <p class="price">₹50 each</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <h3>Blue Dream Shrimp</h3>
      <p class="price">₹80 each</p>
    </div>

  </div>
</section>

<a class="whatsapp" href="https://wa.me/919876543210">💬</a>

<!-- FISH SCRIPT -->
<script>
const fishes = [];
const fishEmojis = ["🐠","🐟","🐡","🐠"];

for(let i=0;i<4;i++){
  const fish = document.createElement("div");
  fish.className = "fish";
  fish.innerHTML = fishEmojis[i];
  document.body.appendChild(fish);
  fishes.push({
    el: fish,
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight
  });
}

let mouseX = window.innerWidth/2;
let mouseY = window.innerHeight/2;

document.addEventListener("mousemove", (e)=>{
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animate(){
  fishes.forEach((fish, index)=>{
    const dx = mouseX - fish.x;
    const dy = mouseY - fish.y;

    fish.x += dx * (0.01 + index*0.002);
    fish.y += dy * (0.01 + index*0.002);

    fish.el.style.transform = `translate(${fish.x}px, ${fish.y}px)`;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
