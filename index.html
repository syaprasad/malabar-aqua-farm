<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malabar Aqua Farm</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, #f8fbff, #e6f7ff);
  overflow-x:hidden;
}

/* NAVBAR */
nav {
  position: sticky;
  top:0;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.6);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  z-index:1000;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img {
  height:50px;
}

nav a {
  text-decoration:none;
  margin-left:20px;
  color:#333;
  font-weight:500;
}

/* HERO */
.hero {
  text-align:center;
  padding:80px 20px;
}

.hero h1 {
  font-size:48px;
  margin:0;
}

.hero p {
  color:#666;
}

/* CARDS */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:25px;
  padding:40px;
}

.card {
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.btn {
  display:inline-block;
  margin-top:10px;
  padding:10px 20px;
  background:#00a86b;
  color:white;
  border-radius:20px;
  text-decoration:none;
}

/* BUBBLES */
.bubble {
  position:fixed;
  bottom:-50px;
  width:20px;
  height:20px;
  background:rgba(255,255,255,0.5);
  border-radius:50%;
  animation:rise 10s infinite;
}

@keyframes rise {
  0% {transform:translateY(0);}
  100% {transform:translateY(-120vh);}
}

/* FISH */
.fish {
  position:fixed;
  width:40px;
  pointer-events:none;
  transition: transform 0.2s linear;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <img src="logo.png">
    <strong>Malabar Aqua Farm</strong>
  </div>
  <div>
    <a href="#">Plants</a>
    <a href="#">Shrimp</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Premium Aquatic Life</h1>
  <p>Healthy Plants & Exotic Shrimp in Kerala</p>
</div>

<!-- PRODUCTS -->
<div class="grid">
  <div class="card">
    <h3>Java Moss</h3>
    <p>₹150</p>
    <a class="btn" href="#">Order</a>
  </div>

  <div class="card">
    <h3>Anubias Nana</h3>
    <p>₹250</p>
    <a class="btn" href="#">Order</a>
  </div>

  <div class="card">
    <h3>Red Cherry Shrimp</h3>
    <p>₹50 each</p>
    <a class="btn" href="#">Order</a>
  </div>

  <div class="card">
    <h3>Blue Dream Shrimp</h3>
    <p>₹80 each</p>
    <a class="btn" href="#">Order</a>
  </div>
</div>

<!-- BUBBLES -->
<script>
for(let i=0;i<20;i++){
  let b=document.createElement("div");
  b.className="bubble";
  b.style.left=Math.random()*100+"vw";
  b.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(b);
}
</script>

<!-- FISH FOLLOW -->
<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="fish" id="fish1">
<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" class="fish" id="fish2">

<script>
let fish1=document.getElementById("fish1");
let fish2=document.getElementById("fish2");

let x=0,y=0;

document.addEventListener("mousemove",(e)=>{
  x+=(e.clientX-x)*0.05;
  y+=(e.clientY-y)*0.05;

  fish1.style.transform=`translate(${x}px,${y}px)`;
  fish2.style.transform=`translate(${x-60}px,${y+40}px)`;
});
</script>

</body>
</html>
