<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malabar Aqua Farm</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">🌿 Malabar Aqua Farm</div>

  <nav>
    <a href="#">Aquatic Plants</a>
    <a href="#">Shrimps</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Premium Aquatic Store</h1>
  <p>Plants • Shrimps • Fish Food</p>
  
</section>

<!-- PRODUCTS -->
<section class="products">

  <h2>Featured Products</h2>

  <div class="grid">

    <!-- ITEM -->
    <div class="card">
      <img src="images/item1.jpg">

      <h3>Sample Item</h3>
      <p class="price">₹100</p>

      <p class="stock">In Stock</p>

      <button onclick="order('Sample Item')">Order</button>
    </div>

    <!-- SOLD OUT ITEM -->
    <div class="card sold">
      <img src="images/item2.jpg">

      <h3>Sample Item 2</h3>
      <p class="price">₹120</p>

      <p class="stock">Out of Stock</p>

      <button disabled>Sold Out</button>
    </div>

  </div>

</section>

<!-- FOOTER -->
<footer class="footer">

  <div class="footer-grid">

    <div>
      <h4>Information</h4>
      <p>About Us</p>
      <p>Contact</p>
      <p>Privacy Policy</p>
    </div>

    <div>
      <h4>Contact</h4>
      <p>Phone: +91 XXXXXXXX</p>
      <p>Email: your@email.com</p>
    </div>

  </div>

</footer>

<script>
function order(item){
  const number = "91XXXXXXXXXX"; // replace your number
  const msg = `I want to order ${item}`;
  window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
