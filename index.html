<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malabar Aquatic Plants</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.search {
  text-align: center;
  margin: 10px;
}

.search input {
  padding: 10px;
  width: 80%;
  max-width: 400px;
  border-radius: 10px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
}

.price { color: #22c55e; font-weight: bold; }

.stock {
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 8px;
}

.in { background: green; }
.out { background: red; }

button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #25D366;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🌿 Malabar Aquatic Plants 🐟</header>

<div class="search">
<input type="text" id="search" placeholder="Search..." onkeyup="searchItems()">
</div>

<div class="grid" id="products"></div>

<script>

// 👉 PUT YOUR NUMBER HERE
let phone = "919895008346";

let products = [

{n:"Electric Blue Shrimp",p:60,s:1},
{n:"Wild Shrimp",p:30,s:1},
{n:"Red Cherry Shrimp",p:40,s:1},
{n:"Mixed Guppy",p:40,s:1},
{n:"Stone Catfish",p:75,s:1},
{n:"Neon Tetra",p:40,s:1},

{n:"Anubias Nana Big Leaf",p:350,s:1},
{n:"Anubias Coin Leaf",p:250,s:1},
{n:"Anubias Gold",p:300,s:1},

{n:"Cabomba Green",p:60,s:1},
{n:"Cabomba Red",p:60,s:1},
{n:"Ludwigia Repens",p:55,s:1},
{n:"Ludwigia Mini Super Red",p:70,s:1},
{n:"Ludwigia Ovalis",p:100,s:1},

{n:"Rotala Blood Red",p:120,s:1},
{n:"Rotala Hra Red",p:60,s:1},
{n:"Rotala Wallichii Mexicana",p:60,s:1},

{n:"Eriocaulon Cinereum",p:75,s:0},
{n:"Blyxa Japonica",p:70,s:1},
{n:"Aponogeton Crispus",p:60,s:1},
{n:"Hydrocotyle Tripartita",p:130,s:1},

{n:"Java Fern",p:130,s:1},
{n:"Java Fern Dwarf",p:130,s:1},
{n:"Java Moss Coconut",p:340,s:1},
{n:"Mini Xmas Moss",p:250,s:1},

{n:"Wolffia",p:150,s:1},
{n:"Duckweed",p:50,s:1},

{n:"Dragon Rock",p:299,s:1},
{n:"Black Sand",p:75,s:1},
{n:"River Gravel",p:70,s:1},
{n:"Pebbles",p:80,s:1}

];

// AUTO GENERATE
function loadProducts(){
  let container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p=>{
    let stock = p.s ? "In Stock" : "Out of Stock";
    let cls = p.s ? "in" : "out";

    container.innerHTML += `
    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>${p.n}</h3>
      <p class="price">₹${p.p}</p>
      <span class="stock ${cls}">${stock}</span>
      ${p.s ? `<button onclick="order('${p.n}')">Order</button>` : `<button disabled>Out of Stock</button>`}
    </div>`;
  });
}

function order(item){
  let msg = "Hello, I want to order: " + item;
  window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}

function searchItems(){
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(input) ? "block" : "none";
  });
}

loadProducts();

</script>

</body>
</html>
