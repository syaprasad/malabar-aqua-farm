<script>
// =======================
// 🦐 SHRIMP AI (SLOW + SMOOTH)
// =======================

const shrimpData=[
  {
    src:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Neocaridina_davidi_red_cherry.png",
    x:200,y:300
  },
  {
    src:"https://upload.wikimedia.org/wikipedia/commons/6/60/Caridina_multidentata.png",
    x:500,y:500
  }
];

let shrimps=[];

shrimpData.forEach(data=>{
  let s=document.createElement("img");
  s.src=data.src;
  s.className="shrimp";

  document.body.appendChild(s);

  shrimps.push({
    el:s,
    x:data.x,
    y:data.y,
    vx:(Math.random()*1.5)*0.5,   // 🔥 HALF SPEED
    vy:(Math.random()*1.5)*0.5
  });
});

let mouse={x:0,y:0};

document.addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});

function animate(){
  shrimps.forEach(s=>{

    let dx=s.x-mouse.x;
    let dy=s.y-mouse.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    // 🧠 ESCAPE (reduced power)
    if(dist<150){
      s.vx+=dx*0.015;   // 🔥 reduced from 0.03
      s.vy+=dy*0.015;
    }

    // 🌊 FLOATING (softer)
    s.vx+=(Math.random()-0.5)*0.02;
    s.vy+=(Math.random()-0.5)*0.02;

    // SMOOTH DRAG
    s.vx*=0.99;
    s.vy*=0.99;

    s.x+=s.vx;
    s.y+=s.vy;

    // BOUNDS
    if(s.x<0||s.x>window.innerWidth) s.vx*=-1;
    if(s.y<0||s.y>window.innerHeight) s.vy*=-1;

    let angle=Math.atan2(s.vy,s.vx)*180/Math.PI;

    s.el.style.transform=
      `translate(${s.x}px,${s.y}px) rotate(${angle}deg)`;
  });

  requestAnimationFrame(animate);
}

animate();
</script>
